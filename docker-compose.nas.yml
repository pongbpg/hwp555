# docker-compose.nas.yml
# Override สำหรับ deploy บน NAS
# ใช้ร่วมกับ docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.nas.yml up -d --build
#
# หรือถ้าใช้ deploy.sh จะ pick ไฟล์นี้อัตโนมัติถ้าตั้ง COMPOSE_FILE

services:
  hr-backend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hr-frontend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stock-backend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stock-frontend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB Daily Backup
  # - บันทึก backup ไปที่ /Shared/docker/hwp555/backups/ บน host
  # - เก็บไว้ 7 วัน แล้วลบอัตโนมัติ
  # - backup ครั้งแรกทันทีที่ container start และทุก 24 ชั่วโมงหลังจากนั้น
  mongo-backup:
    image: mongo:latest
    container_name: hwp555-mongo-backup
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - /volume1/docker/hwp555/backups:/backups
    environment:
      MONGO_USER: ${MONGO_ROOT_USERNAME:-root}
      MONGO_PASS: ${MONGO_ROOT_PASSWORD:-password}
    entrypoint: >
      bash -c '
        do_backup() {
          DATE=$$(date +"%Y-%m-%d_%H%M")
          OUTFILE="/backups/db-$$DATE.gz"
          echo "[$(date)] HWP555 Backup → $$OUTFILE"
          mongodump \
            --uri="mongodb://$$MONGO_USER:$$MONGO_PASS@mongodb:27017/?authSource=admin" \
            --gzip --archive="$$OUTFILE" \
            && echo "[$(date)] Backup สำเร็จ: $$OUTFILE" \
            || echo "[$(date)] Backup ล้มเหลว!"
          find /backups -name "db-*.gz" -mtime +7 -delete
          echo "[$(date)] ลบ backup เก่ากว่า 7 วันแล้ว"
        }
        seconds_until_3am() {
          NOW=$$(date +%s)
          TARGET=$$(date -d "03:00" +%s 2>/dev/null || date -j -f "%H:%M" "03:00" +%s 2>/dev/null || echo 0)
          if [ "$$TARGET" -le "$$NOW" ]; then
            TARGET=$$((TARGET + 86400))
          fi
          echo $$((TARGET - NOW))
        }
        mkdir -p /backups
        WAIT=$$(seconds_until_3am)
        echo "[$(date)] รอจนถึงตี 3 (อีก $$(( WAIT / 3600 )) ชม. $$(( (WAIT % 3600) / 60 )) นาที)..."
        sleep $$WAIT
        while true; do
          do_backup
          sleep 86400
        done
      '
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - hr-frontend
      - stock-frontend
    restart: unless-stopped
